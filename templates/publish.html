{% extends "base.html" %}

{% block title %}发表文章 - 博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card animate__animated animate__fadeInDown">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="bi bi-pencil-square"></i> 发表文章
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('publish_article') }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">文章标题</label>
                        <input type="text" class="form-control" id="title" name="title" 
                               placeholder="请输入文章标题" required maxlength="100">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="main_category" class="form-label">主分类</label>
                                <input type="text" class="form-control" id="main_category" name="main_category" 
                                       placeholder="如：Python、JavaScript、数据库" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="sub_category" class="form-label">子分类</label>
                                <input type="text" class="form-control" id="sub_category" name="sub_category" 
                                       placeholder="如：基础教程、进阶教程" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="content" class="form-label">文章内容</label>
                        <textarea class="form-control" id="content" name="content" rows="15" 
                                  placeholder="请输入文章内容，至少50个字符..." required></textarea>
                        <small class="text-muted">文章内容至少需要50个字符</small>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send"></i> 发表文章
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="bi bi-x"></i> 取消
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 字数统计
document.getElementById('content').addEventListener('input', function() {
    const content = this.value;
    const length = content.length;
    const minLength = 50;
    
    let small = this.nextElementSibling;
    if (!small.classList.contains('text-muted')) {
        small = document.createElement('small');
        small.className = 'text-muted';
        this.parentNode.insertBefore(small, this.nextSibling);
    }
    
    small.textContent = `当前字数: ${length}，至少需要${minLength}个字符`;
    
    if (length < minLength) {
        small.className = 'text-danger';
    } else {
        small.className = 'text-success';
    }
});
</script>
{% endblock %}
