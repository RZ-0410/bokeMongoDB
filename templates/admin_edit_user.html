{% extends "base.html" %}

{% block title %}编辑用户 - {{ user.username }} - 博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card animate__animated animate__fadeInDown">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="bi bi-pencil"></i> 编辑用户: {{ user.username }}
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin_edit_user', user_id=user._id) }}">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" name="username" 
                                       value="{{ user.username }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="phone" class="form-label">手机号</label>
                                <input type="tel" class="form-control" id="phone" name="phone" 
                                       value="{{ user.phone or '' }}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">新密码（留空则不修改）</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="输入新密码">
                        <small class="text-muted">密码长度至少6位</small>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="role" class="form-label">角色</label>
                                <select class="form-select" id="role" name="role" required>
                                    <option value="user" {% if user.role == 'user' %}selected{% endif %}>
                                        普通用户
                                    </option>
                                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>
                                        管理员
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="is_active" class="form-label">状态</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="is_active" 
                                           name="is_active" {% if user.is_active %}checked{% endif %}>
                                    <label class="form-check-label" for="is_active">
                                        启用账户
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check"></i> 保存修改
                        </button>
                        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">
                            <i class="bi bi-x"></i> 取消
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
